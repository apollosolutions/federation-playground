app = 'federation-playground'
primary_region = 'ord'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[http_service.concurrency]
  type = 'requests'
  soft_limit = 35
  hard_limit = 70

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
